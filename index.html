<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxury Upgrade</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4, #ffdde1);
}

/* ánh sáng chạy nền */
body::before {
  content: "";
  position: absolute;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(255,255,255,0.2), transparent 60%);
  animation: moveLight 10s linear infinite;
}

@keyframes moveLight {
  0% { transform: translate(-30%, -30%); }
  50% { transform: translate(30%, 30%); }
  100% { transform: translate(-30%, -30%); }
}

/* container */
.container {
  text-align: center;
  padding: 50px;
  border-radius: 25px;
  background: rgba(255,255,255,0.2);
  backdrop-filter: blur(20px);
  box-shadow: 0 0 50px rgba(255,105,180,0.4);
  z-index: 2;
}

/* text glow */
h1 {
  font-size: 34px;
  color: #ff2e63;
  text-shadow: 0 0 10px rgba(255,46,99,0.6);
  animation: fadeUp 1.5s ease;
}

p {
  margin: 20px 0;
  color: #fff;
}

/* countdown */
#countdown {
  font-size: 22px;
  margin: 20px 0;
  color: #ff2e63;
  font-weight: bold;
}

/* button */
.btn {
  display: inline-block;
  padding: 12px 25px;
  border-radius: 50px;
  background: #ff2e63;
  color: #fff;
  text-decoration: none;
  margin-top: 10px;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.1);
  box-shadow: 0 0 20px #ff2e63;
}

/* heart */
.heart {
  position: absolute;
  top: -50px;
  color: #ff2e63;
  animation: fall linear infinite;
}

@keyframes fall {
  to {
    transform: translateY(110vh) rotate(360deg);
    opacity: 0;
  }
}

/* fade */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(40px);}
  to { opacity: 1; transform: translateY(0);}
}

</style>
</head>

<body>

<div class="container">
  <h1>💖 COMING SOON 💖</h1>

  <p>
    Website đang nâng cấp lên phiên bản <b>Luxury Pro Max</b> 😏<br>
    Sắp quay lại với trải nghiệm mượt hơn, dễ sử dụng hơn, thêm một số tính năng mới!
  </p>

  <div id="countdown">Loading...</div>

  <a href="https://www.tiktok.com" target="_blank" class="btn">
    Trải nghiệm thú vị 🔥
  </a>
</div>

<script>
/* countdown */
const targetDate = new Date();
targetDate.setHours(targetDate.getHours() + 5);

function updateCountdown() {
  const now = new Date();
  const diff = targetDate - now;

  const h = Math.floor(diff / (1000*60*60));
  const m = Math.floor((diff % (1000*60*60)) / (1000*60));
  const s = Math.floor((diff % (1000*60)) / 1000);

  document.getElementById("countdown").innerHTML =
    h + "h " + m + "m " + s + "s";
}

setInterval(updateCountdown, 1000);

/* heart */
function createHeart() {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "💖";

  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (20 + Math.random()*40) + "px";
  heart.style.animationDuration = (4 + Math.random()*4) + "s";

  document.body.appendChild(heart);

  setTimeout(() => heart.remove(), 8000);
}

setInterval(createHeart, 200);
</script>

</body>
</html>
