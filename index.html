<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Box Cover - Hát cho Linh nghe</title>

  <style>
    :root{
      --bg1:#1a0f17;
      --bg2:#2a1423;
      --bg3:#3b1e33;
      --card:rgba(255,255,255,0.10);
      --line:rgba(255,255,255,0.16);
      --text:#fff8fc;
      --muted:rgba(255,245,250,0.78);
      --pink:#f9a8d4;
      --rose:#fb7185;
      --shadow:0 18px 40px rgba(0,0,0,0.32);
    }

    *{margin:0;padding:0;box-sizing:border-box;}

    body{
      font-family:"Segoe UI";
      color:var(--text);
      background:linear-gradient(180deg,var(--bg1),var(--bg2),var(--bg3));
    }

    .app{max-width:1100px;margin:auto;padding:20px;}

    .topbar{
      display:flex;justify-content:space-between;
      background:rgba(255,255,255,0.1);
      padding:10px 15px;border-radius:50px;
    }

    .screen{display:none;}
    .screen.active{display:block;}

    .hero{text-align:center;margin:40px 0;}
    .hero h1{font-size:40px;margin-bottom:10px;}

    .topic-grid{display:flex;gap:20px;margin-top:30px;}

    .topic-card{
      flex:1;padding:30px;border-radius:20px;
      background:rgba(255,255,255,0.08);
      cursor:pointer;
    }

    .song-layout{display:flex;gap:20px;margin-top:20px;}
    .song-list{flex:1;}
    .song-item{padding:10px;border-bottom:1px solid #444;cursor:pointer;}
    .song-item:hover{color:#f9a8d4;}

    .player-card{flex:1;}
  </style>
</head>

<body>
<div class="app">

<div class="topbar">
  <div>Box Cover - Hát cho Linh nghe</div>
  <div>💖 cho Linh</div>
</div>

<!-- HOME -->
<section id="homeScreen" class="screen active">
  <div class="hero">
    <h1>Box Cover</h1>
    <p>Web này chỉ để hát cho Linh nghe thôi 💗</p>
  </div>

  <div class="topic-grid">
    <div class="topic-card" onclick="openTopic('sad')">Nhạc buồn</div>
    <div class="topic-card" onclick="openTopic('happy')">Nhạc vui</div>
  </div>
</section>

<!-- TOPIC -->
<section id="topicScreen" class="screen">

  <button onclick="goHome()">← Trở về</button>

  <h2 id="topicTitle"></h2>

  <div class="song-layout">

    <div id="songList" class="song-list"></div>

    <div class="player-card">
      <h3 id="playerTitle">Chưa chọn bài</h3>
      <audio id="audio" controls></audio>
    </div>

  </div>

</section>

</div>

<script>

const musicData = {

  sad:{
    title:"Nhạc buồn",
    songs:[

      {title:"Mảnh Tình Sai Đôi",file:"audio/nhac-buon/manh-tinh-sai-doi.mp3"},
      {title:"Lo Người Ướt Áo",file:"audio/nhac-buon/lo-nguoi-uot-ao.mp3"},

      {title:"Xin Lỗi Vì Đã Xuất Hiện",file:"audio/nhac-buon/xin-loi-vi-da-xuat-hien.mp3"},
      {title:"Phim Ba Người",file:"audio/nhac-buon/phim-ba-nguoi.mp3"},
      {title:"Nhìn Về Phía Em",file:"audio/nhac-buon/nhin-ve-phia-em.mp3"},
      {title:"Người Tình Duyên Trời",file:"audio/nhac-buon/nguoi-tinh-duyen-troi.mp3"},
      {title:"Đừng Quên Tên Anh",file:"audio/nhac-buon/dung-quen-ten-anh.mp3"},
      {title:"Đừng Khóc Một Mình Em Ơi",file:"audio/nhac-buon/dung-khoc-mot-minh-em-oi.mp3"},
      {title:"Cần Không Có, Có Không Cần",file:"audio/nhac-buon/can-khong-co-co-khong-can.mp3"}

    ]
  },

  happy:{
    title:"Nhạc vui",
    songs:[

      {title:"Có Được Không Em",file:"audio/nhac-vui/co-duoc-khong-em.mp3"},
      {title:"Anh",file:"audio/nhac-vui/anh.mp3"},
      {title:"Anh Nhớ Ra",file:"audio/nhac-vui/anh-nho-ra.mp3"},
      {title:"Dù Cho Tận Thế",file:"audio/nhac-vui/du-cho-tan-the.mp3"},
      {title:"Em Của Anh Đừng Của Ai",file:"audio/nhac-vui/em-cua-anh-dung-cua-ai.mp3"},
      {title:"Nắng Dưới Chân Mây",file:"audio/nhac-vui/nang-duoi-chan-may.mp3"},
      {title:"Nơi Này Có Anh",file:"audio/nhac-vui/noi-nay-co-anh.mp3"}

    ]
  }

};

const homeScreen=document.getElementById("homeScreen");
const topicScreen=document.getElementById("topicScreen");
const songList=document.getElementById("songList");
const audio=document.getElementById("audio");

function openTopic(type){
  homeScreen.classList.remove("active");
  topicScreen.classList.add("active");

  document.getElementById("topicTitle").innerText=musicData[type].title;

  songList.innerHTML="";

  musicData[type].songs.forEach((song,i)=>{
    songList.innerHTML+=`
      <div class="song-item" onclick="playSong('${song.file}','${song.title}')">
        ${i+1}. ${song.title}
      </div>
    `;
  });
}

function playSong(file,title){
  audio.src=file;
  document.getElementById("playerTitle").innerText=title;
  audio.play();
}

function goHome(){
  topicScreen.classList.remove("active");
  homeScreen.classList.add("active");
  audio.pause();
}

</script>

</body>
</html>
